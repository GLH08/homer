# ============================================
# Homer Dashboard - Docker Compose (本地构建)
# ============================================
#
# 构建并启动：docker-compose up -d --build
# 更新镜像：  docker-compose up -d --build
#

services:
  homer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homer
    restart: always
    ports:
      - "30880:8080"
    environment:
      - INIT_ASSETS=0
    volumes:
      - ./config.yml:/www/assets/config.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "-Y", "off", "-T", "5", "-t", "1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - homer

networks:
  homer:
    driver: bridge
