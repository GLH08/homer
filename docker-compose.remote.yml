# ============================================
# Homer Dashboard - Docker Compose (远程构建)
# ============================================
#
# 从 GHCR 拉取镜像启动：docker-compose -f docker-compose.remote.yml up -d
# 更新镜像：         docker-compose -f docker-compose.remote.yml pull
#
# 环境变量说明：
#   OPENWEATHER_API_KEY   - OpenWeatherMap API 密钥
#   可在 .env 文件中配置
#

services:
  homer:
    image: ghcr.io/glh08/homer:latest
    container_name: homer
    restart: always
    ports:
      - "30880:8080"
    environment:
      - INIT_ASSETS=0
    volumes:
      - ./config.yml:/www/assets/config.yml:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "-Y", "off", "-T", "5", "-t", "1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - homer

networks:
  homer:
    driver: bridge
