# ============================================
# 环境变量使用说明
# ============================================
#
# 配置文件中使用 ${VAR_NAME} 引用环境变量
#
# 示例:
#   apikey: "${OPENWEATHER_API_KEY}"
#   url: "${SONARR_URL:-http://localhost:8989}"  # 带默认值
#
# 部署时设置环境变量:
#   export OPENWEATHER_API_KEY=your_api_key
#   docker run -e OPENWEATHER_API_KEY=your_api_key ...
#
# 或使用 .env 文件 + docker-compose:
#   创建 .env 文件（已在 .gitignore 中）
#   OPWTHER_API_KEY=your_key
#   执行: docker-compose up
#
