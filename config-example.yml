# ============================================
# Homer 配置文件示例
# ============================================
#
# 使用说明：
# 1. 复制此文件为 config.yml（与 docker-compose.yml 同级）
# 2. 按需修改配置内容
# 3. 使用 docker-compose up -d --build 启动
#

---
title: "Dashboard"
subtitle: "Homer"
logo: "logo.png"

header: true
footer: '<p>使用 ❤️ 和 <a href="https://github.com/bastienwirtz/homer">Homer</a> 构建</p>'

theme: homarr
columns: "4"
connectivityCheck: true

defaults:
  layout: columns
  colorTheme: light

colors:
  light:
    highlight-primary: "#3a6095"
    highlight-secondary: "#466370"
    background: "#f7f9fb"
    card-background: "#f0f4f7"
    text: "#2c3437"
  dark:
    highlight-primary: "#9ec2fe"
    highlight-secondary: "#bbd9e9"
    background: "#0f1419"
    card-background: "#1a2332"
    text: "#e5eaef"

services:

  # ============================================
  # 基础分组
  # ============================================

  - name: "信息"
    icon: "fas fa-info-circle"
    items:
      # ----- 时钟（内置） -----
      - name: "时钟"
        type: "Clock"
        icon: "fas fa-clock"
        showDate: true
        hour12: false
        locale: "zh-CN"

      # ----- 天气（免费接口，无需 API Key） -----
      # 使用 wttr.in 免费天气接口，无需注册
      - name: "天气"
        type: "OpenWeather"
        icon: "fas fa-cloud-sun"
        location: "Beijing"
        units: "metric"
        tag: "天气"

      # ----- 天气（OpenWeatherMap API） -----
      # 需要申请 API Key: https://openweathermap.org/api
      # - name: "天气-API"
      #   type: "OpenWeather"
      #   icon: "fas fa-cloud-sun"
      #   apikey: "${OPENWEATHER_API_KEY}"    # 使用环境变量
      #   location: "Tokyo"
      #   units: "metric"
      #   tag: "天气"

      # ----- Ping 检测 -----
      # 检测网站是否可达，显示延迟
      - name: "Google"
        type: "Ping"
        icon: "fas fa-globe"
        url: "https://www.google.com"
        tag: "网络"

      # ----- 复制到剪贴板 -----
      # 点击复制按钮复制指定文本
      - name: "复制邮箱"
        type: "CopyToClipboard"
        icon: "fas fa-envelope"
        subtitle: "点击复制邮箱地址"
        clipboard: "example@email.com"
        tag: "工具"

  # ============================================
  # 媒体服务（需对应服务运行）
  # ============================================

  - name: "媒体服务"
    icon: "fas fa-play-circle"
    items:
